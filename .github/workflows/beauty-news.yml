name: Beauty News Daily

on:
  schedule:
    # 10:00 UTC = 13:00 MSK (разнесено от Good News 03:00 UTC, даёт лимитам NotebookLM сброситься)
    - cron: '0 10 * * *'
  workflow_dispatch: # manual trigger from GitHub UI

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r python/requirements.txt
          playwright install chromium --with-deps

      - name: Restore NotebookLM auth
        run: |
          mkdir -p ~/.notebooklm
          echo "${{ secrets.NOTEBOOKLM_STORAGE_STATE }}" | base64 -d > ~/.notebooklm/storage_state.json

      - name: Restore news log cache
        uses: actions/cache@v4
        with:
          path: python/output/news_log.json
          key: news-log-${{ github.run_id }}
          restore-keys: news-log-

      - name: Run research pipeline
        working-directory: python
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: python main.py run

      - name: Upload output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: beauty-news-${{ github.run_id }}
          path: python/output/
          retention-days: 30

      - name: Notify admin on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$TELEGRAM_ADMIN_CHAT_ID" ]; then
            echo "TELEGRAM_ADMIN_CHAT_ID not set — skipping notification."
            exit 0
          fi
          LOG=$(gh run view ${{ github.run_id }} --log-failed 2>/dev/null || true)
          if echo "$LOG" | grep -q "Authentication expired or invalid"; then
            REASON="🔑 <b>NotebookLM auth протух</b>%0A%0AПерелогинься локально: <code>cd python && python main.py login</code>, затем обнови секрет <code>NOTEBOOKLM_STORAGE_STATE</code>."
          elif echo "$LOG" | grep -qi "rate.\?limit"; then
            REASON="⏳ <b>NotebookLM rate limit</b>%0A%0AСегодня аудио не будет — попробует завтра."
          else
            REASON="❌ <b>Beauty News упал</b>%0A%0AПричина неизвестна — глянь логи."
          fi
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_ADMIN_CHAT_ID}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            --data-urlencode "text=${REASON}

<a href=\"${RUN_URL}\">Run log</a>"
