name: RSS News Bot

on:
  schedule:
    # Every 5 minutes, 04:00-18:00 UTC (07:00-21:00 MSK = quiet hours respected)
    # GitHub Actions throttles cron to ~1 run/hour; */5 ensures it actually
    # fires roughly every 20 min. POST_INTERVAL (10 min) prevents double-posting.
    - cron: '*/5 4-18 * * *'
  workflow_dispatch: # manual trigger

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r python/requirements.txt

      - name: Restore posted articles cache
        uses: actions/cache@v4
        with:
          path: python/output/rss_posted.json
          key: rss-posted-${{ github.run_id }}
          restore-keys: rss-posted-

      - name: Post one news item
        working-directory: python
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: python main.py news-once
