name: Find Telegram Chat ID

on:
  workflow_dispatch:

jobs:
  find:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch chat IDs from getUpdates
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          echo "=== Bot info ==="
          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getMe" \
            | python3 -c "import json,sys; d=json.load(sys.stdin).get('result',{}); print(f\"Bot: @{d.get('username')} ({d.get('first_name')})\")"
          echo ""
          echo "=== Updates ==="
          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates" \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          if not data.get('ok'):
              print('API error:', data)
              sys.exit(1)
          seen = {}
          for upd in data.get('result', []):
              msg = upd.get('message') or upd.get('channel_post') or upd.get('edited_message') or {}
              chat = msg.get('chat') or {}
              cid = chat.get('id')
              if cid is None or cid in seen:
                  continue
              seen[cid] = chat
              print(f\"chat_id={cid}  type={chat.get('type')}  username=@{chat.get('username','')}  name={chat.get('first_name','')} {chat.get('last_name','')}\".strip())
          if not seen:
              print('No updates. DM the bot /start and re-run this workflow.')
          "
